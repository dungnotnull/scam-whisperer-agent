# Scam Phrase Patterns — Vietnamese Context
# Used by the fast-path pattern matcher (src/agents/scam-classifier/pattern-matcher.ts)

patterns:
  # ─── FINANCIAL FRAUD ──────────────────────────────────────────────────────
  - category: prize_lottery
    phrases:
      - "chúc mừng bạn đã trúng thưởng"
      - "chúc mừng ông đã trúng thưởng"
      - "chúc mừng bà đã trúng thưởng"
      - "bạn là người may mắn"
      - "nhận ngay phần thưởng"
      - "điền thông tin để nhận thưởng"
      - "xe máy honda"
      - "trúng thưởng iphone"
      - "tiền mặt 500 triệu"
      - "trúng giải đặc biệt"
      - "quay số may mắn"
      - "khách hàng may mắn"
      - "để nhận thưởng vui lòng"
      - "phí vận chuyển"
      - "phí bảo hành"
      - "thuế trước bạ"
      - "phí xử lý hồ sơ"
      - "chuyển khoản để nhận"
    url_patterns:
      - "honda-*.com"
      - "samsung-*.net"
      - "grab-*.vn"
      - "vietlott-*.com"
      - "trungthuong-*"
    weight: 70

  - category: bank_account_freeze
    phrases:
      - "tài khoản của bạn bị tạm khóa"
      - "tài khoản của quý khách bị tạm khóa"
      - "đăng nhập ngay để xác minh"
      - "giao dịch bất thường"
      - "bấm vào đây để mở khóa"
      - "tài khoản sẽ bị đóng vĩnh viễn"
      - "xác minh danh tính tại"
      - "tài khoản bị khóa do hoạt động bất thường"
      - "nếu không xác minh trong 24 giờ"
      - "bảo mật tài khoản của bạn"
      - "cập nhật thông tin tài khoản"
    url_patterns:
      - "vcb-*.com"
      - "vietcombank-*.vn"
      - "vcbonline.*"
      - "bidv-*.com"
      - "bidvbonus.*"
      - "techcombank-*.net"
      - "vpbank-*.net"
      - "acb-*.com"
      - "agribank-*.vn"
      - "mbbank-*.com"
      - "*-bao-mat.com"
      - "*-security.com"
    weight: 80

  - category: bank_password_phishing
    phrases:
      - "xác nhận lại mật khẩu"
      - "cập nhật thông tin tài khoản"
      - "nhập otp để xác minh"
      - "nhập mã xác thực"
      - "cung cấp thông tin đăng nhập"
      - "đăng nhập để kiểm tra"
      - "xác nhận chủ tài khoản"
      - "điền form xác minh"
    impersonated_orgs:
      - vietcombank
      - bidv
      - techcombank
      - momo
      - zalopay
      - vnpay
      - mb bank
      - agribank
      - acb
      - vpbank
    weight: 80

