name: Daily Scam Intelligence Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-knowledge:
    name: Crawl Scam Intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run knowledge crawler
        run: node -e "const{r}=require('./dist/agents/knowledge-updater/crawler');r().then(r=>{console.log('Sources:',r.sourcesChecked,'Reports:',r.reportsFound,'Phrases:',r.newPhrasesAdded);process.exit(0)}).catch(e=>{console.error(e);process.exit(1)});"
      - name: Commit updated data files
        run: |
          git config user.name "Scam Whisperer Bot"
          git config user.email "bot@scamwhisperer.vn"
          git add src/data/
          git diff --staged --quiet || git commit -m "Auto: daily scam intelligence update [skip ci]"

            Co-authored-by: CommandCodeBot <noreply@commandcode.ai>"

    permissions:
      contents: write
